# ============================================================
# DebateX Backend — Application Properties
# ============================================================

spring.application.name=debatex-backend
server.port=8000

# ── Database (TiDB Cloud) ─────────────────────────────────
# Replace with your TiDB Cloud connection details
spring.datasource.url=jdbc:mysql://gateway01.us-west-2.prod.aws.tidbcloud.com:4000/debatex?sslMode=VERIFY_IDENTITY&enabledTLSProtocols=TLSv1.2,TLSv1.3
spring.datasource.username=YOUR_TIDB_USERNAME
spring.datasource.password=YOUR_TIDB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── H2 Console (for local dev without TiDB) ──────────────
# Uncomment these and comment TiDB lines above for local dev:
# spring.datasource.url=jdbc:h2:file:./debatex-db
# spring.datasource.username=sa
# spring.datasource.password=
# spring.datasource.driver-class-name=org.h2.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true

# ── JWT ───────────────────────────────────────────────────
app.jwt.secret=DebateX-Super-Secret-Key-Change-In-Production-2024-Make-It-At-Least-256-Bits-Long!!
app.jwt.expiration-ms=86400000

# ── AI Service URL ────────────────────────────────────────
app.ai-service.url=http://localhost:8001

# ── CORS ──────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── Rate Limiting ─────────────────────────────────────────
app.rate-limit.requests-per-minute=60
